<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌳 حديقة التربية الأسرية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#FFF6E0;
  --sky2:#FFEAC2;
  --grass1:#8FE388;
  --grass2:#4FAF52;
  --grass-dark:#2F8A3C;
  --pink:#FF6FA5;
  --pink-dark:#E04E85;
  --yellow:#FFCB3B;
  --yellow-dark:#F2A900;
  --blue:#5FC2F0;
  --blue-dark:#2E9BD6;
  --purple:#A78BFA;
  --purple-dark:#7C5CE0;
  --orange:#FF9A52;
  --orange-dark:#E5761E;
  --red:#FF5C5C;
  --red-dark:#C92E2E;
  --cream:#FFFBF2;
  --ink:#2E2440;
  --ink-soft:#5B5270;
  --white:#ffffff;
  --shadow: 0 10px 25px rgba(46,36,64,0.15);
  --shadow-lg: 0 18px 40px rgba(46,36,64,0.22);
  --r-card: 28px;
  --r-pill: 999px;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background: linear-gradient(180deg, var(--sky) 0%, var(--sky2) 38%, #DFF4C8 70%, #BCE89A 100%);
  color:var(--ink);
  overflow-x:hidden;
  min-height:100vh;
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',sans-serif;}

/* ===== Background scenery ===== */
.scenery{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.cloud{position:absolute; opacity:0.9; animation:drift linear infinite;}
@keyframes drift{
  from{transform:translateX(-120px);}
  to{transform:translateX(calc(100vw + 120px));}
}
.sun{
  position:absolute; top:30px; left:40px; width:90px; height:90px;
  background: radial-gradient(circle, #FFE17A 0%, var(--yellow) 60%, var(--yellow-dark) 100%);
  border-radius:50%;
  box-shadow: 0 0 60px 20px rgba(255,203,59,0.45);
  animation: pulseSun 4s ease-in-out infinite;
}
@keyframes pulseSun{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.06);}
}
.ground-grass{
  position:fixed; bottom:0; left:0; width:100%; z-index:1; pointer-events:none;
}

/* ===== Top bar / progress ===== */
.topbar{
  position:sticky; top:0; z-index:50;
  background: rgba(255,251,242,0.92);
  backdrop-filter: blur(6px);
  border-bottom: 4px dashed var(--grass2);
  padding:10px 18px;
  display:flex; align-items:center; gap:14px;
  flex-wrap:wrap;
}
.topbar .logo{
  font-size:1.3rem; font-weight:800; color:var(--grass-dark);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.progress-wrap{
  flex:1; min-width:160px;
  display:flex; align-items:center; gap:10px;
}
.progress-track{
  flex:1; height:22px; background:#E9E2D0; border-radius:var(--r-pill);
  border:3px solid var(--ink);
  overflow:hidden; position:relative;
}
.progress-fill{
  height:100%; width:0%;
  background: linear-gradient(90deg, var(--yellow), var(--orange), var(--pink));
  border-radius:var(--r-pill);
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.progress-fill::after{
  content:"🌟"; position:absolute; left:-2px; top:50%; transform:translate(-30%,-50%);
  font-size:1rem;
}
.progress-label{
  font-weight:700; font-size:.85rem; color:var(--ink-soft); white-space:nowrap;
}
.stars-counter{
  background:var(--white); border:3px solid var(--ink); border-radius:var(--r-pill);
  padding:5px 14px; font-weight:800; font-size:.95rem; display:flex; align-items:center; gap:6px;
  box-shadow: var(--shadow);
  white-space:nowrap;
}

/* ===== Hero ===== */
.hero{
  position:relative; z-index:2;
  text-align:center; padding:60px 20px 90px;
}
.hero h1{
  font-size:clamp(2rem, 6vw, 3.6rem);
  color:var(--grass-dark);
  text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(47,138,60,0.25);
  margin:0 0 10px;
  font-weight:800;
}
.hero p{
  font-size:1.15rem; color:var(--ink-soft); max-width:640px; margin:0 auto 26px;
  font-weight:600;
}
.hero .balloon-row{
  display:flex; justify-content:center; gap:18px; margin-top:10px; flex-wrap:wrap;
}
.mini-balloon{
  width:64px; height:78px; border-radius:50% 50% 50% 50%/55% 55% 45% 45%;
  display:flex; align-items:center; justify-content:center; font-size:1.6rem;
  box-shadow: var(--shadow); animation: bob 3s ease-in-out infinite;
  position:relative;
}
.mini-balloon::after{
  content:""; position:absolute; bottom:-22px; left:50%; width:2px; height:22px; background:var(--ink-soft);
}
@keyframes bob{
  0%,100%{transform:translateY(0) rotate(-2deg);}
  50%{transform:translateY(-14px) rotate(2deg);}
}

/* ===== Sections (fields in the garden) ===== */
.field{
  position:relative; z-index:2;
  max-width:1100px; margin:0 auto; padding:10px 20px 60px;
}
.field-header{
  display:flex; align-items:center; gap:14px; margin-bottom:26px; flex-wrap:wrap;
}
.field-icon{
  width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:1.7rem; box-shadow:var(--shadow); border:4px solid var(--white);
  flex-shrink:0;
}
.field-title{
  font-size:clamp(1.3rem,3.4vw,1.8rem); font-weight:800; color:var(--ink);
}
.field-sub{
  font-size:.95rem; color:var(--ink-soft); font-weight:600; margin-top:2px;
}

/* card grid */
.grid{
  display:grid; gap:20px;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
}

/* Floating card (balloon/block) */
.card{
  background:var(--white);
  border-radius: var(--r-card);
  box-shadow: var(--shadow);
  border:3px solid transparent;
  padding:20px 20px 18px;
  cursor:pointer;
  position:relative;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease, border-color .3s ease;
  animation: floaty 5s ease-in-out infinite;
  outline-offset:3px;
}
.card:nth-child(odd){animation-duration:6s;}
.card:nth-child(even){animation-duration:5.4s; animation-delay:.4s;}
@keyframes floaty{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.card:hover, .card:focus-visible{
  transform: translateY(-14px) scale(1.03) rotate(-0.5deg);
  box-shadow: var(--shadow-lg);
  animation-play-state: paused;
}
.card.done{
  border-color: var(--grass2);
}
.card.done .card-check{
  opacity:1; transform:scale(1);
}
.card-emoji{
  font-size:2rem; display:block; margin-bottom:8px;
}
.card-title{
  font-weight:800; font-size:1.05rem; margin:0 0 6px; color:var(--ink);
}
.card-teaser{
  font-size:.88rem; color:var(--ink-soft); font-weight:600; margin:0;
}
.card-check{
  position:absolute; top:14px; left:14px; width:26px; height:26px; border-radius:50%;
  background:var(--grass2); color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:.85rem; opacity:0; transform:scale(0); transition:.3s cubic-bezier(.34,1.56,.64,1);
}
.card-body{
  display:none; margin-top:14px; padding-top:14px; border-top:2px dashed #eee;
  font-size:.93rem; color:var(--ink); line-height:1.85; font-weight:600;
}
.card.open .card-body{display:block;}
.card.open{animation:none; transform:none;}
.card-body ul{margin:8px 0; padding-right:20px;}
.card-body li{margin-bottom:6px;}
.card-body .tip{
  margin-top:10px; background:#FFF7DA; border-radius:14px; padding:10px 12px;
  font-size:.86rem; border-right:4px solid var(--yellow-dark);
}

/* color variants by field */
.f-care .field-icon{background:var(--pink);}
.f-care .card{border-top:6px solid var(--pink);}
.f-traits .field-icon{background:var(--blue);}
.f-traits .card{border-top:6px solid var(--blue);}
.f-functions .field-icon{background:var(--purple);}
.f-functions .card{border-top:6px solid var(--purple);}
.f-aspects .field-icon{background:var(--orange);}
.f-aspects .card{border-top:6px solid var(--orange);}
.f-goals .field-icon{background:var(--grass2);}
.f-goals .card{border-top:6px solid var(--grass2);}
.f-methods .field-icon{background:var(--yellow-dark);}
.f-methods .card{border-top:6px solid var(--yellow);}
.f-parents .field-icon{background:var(--blue-dark);}
.f-parents .card{border-top:6px solid var(--blue-dark);}
.f-styles .field-icon{background:var(--pink-dark);}
.f-styles .card{border-top:6px solid var(--pink-dark);}
.f-theories .field-icon{background:var(--purple-dark);}
.f-theories .card{border-top:6px solid var(--purple-dark);}
.f-family .field-icon{background:var(--orange-dark);}
.f-family .card{border-top:6px solid var(--orange-dark);}
.f-interaction .field-icon{background:var(--grass-dark);}
.f-interaction .card{border-top:6px solid var(--grass2);}
.f-positive .field-icon{background:var(--yellow-dark);}
.f-positive .card{border-top:6px solid var(--yellow-dark);}
.f-democracy .field-icon{background:var(--blue);}
.f-democracy .card{border-top:6px solid var(--blue);}
.f-special .field-icon{background:var(--purple);}
.f-special .card{border-top:6px solid var(--purple);}
.f-social .field-icon{background:var(--orange);}
.f-social .card{border-top:6px solid var(--orange);}
.f-scholars .field-icon{background:var(--grass-dark);}
.f-scholars .card{border-top:6px solid var(--grass-dark);}

/* ===== Danger Zone (cute monster) ===== */
.danger-zone{
  position:relative; z-index:2;
  max-width:1100px; margin:20px auto 70px; padding:0 20px;
}
.danger-box{
  background: linear-gradient(160deg, #FFE3E3 0%, #FFD2D2 100%);
  border:5px solid var(--red);
  border-radius:32px;
  padding:30px 24px;
  position:relative;
  box-shadow: 0 0 0 8px rgba(255,92,92,0.12), var(--shadow-lg);
}
.danger-box::before{
  content:"";
  position:absolute; inset:-5px; border-radius:32px;
  background: repeating-linear-gradient(135deg, transparent 0 18px, rgba(255,255,255,0.35) 18px 22px);
  pointer-events:none;
}
.monster-head{
  width:84px; height:84px; margin:0 auto 10px; position:relative;
  background: var(--red);
  border-radius:50% 50% 45% 45%/55% 55% 45% 45%;
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow);
  animation: wiggle 2.6s ease-in-out infinite;
}
@keyframes wiggle{
  0%,100%{transform:rotate(-4deg);}
  50%{transform:rotate(4deg);}
}
.monster-head .eyes{display:flex; gap:14px;}
.monster-head .eye{
  width:20px; height:20px; background:#fff; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.monster-head .eye::after{content:""; width:9px; height:9px; background:var(--ink); border-radius:50%;}
.monster-head .horn{
  position:absolute; top:-14px; width:0; height:0;
  border-left:9px solid transparent; border-right:9px solid transparent; border-bottom:18px solid var(--red-dark);
  border-radius:4px;
}
.monster-head .horn.l{left:14px; transform:rotate(-15deg);}
.monster-head .horn.r{right:14px; transform:rotate(15deg);}
.danger-title{
  text-align:center; font-size:clamp(1.3rem,3.6vw,1.8rem); font-weight:800; color:var(--red-dark);
  margin:0 0 4px;
}
.danger-sub{
  text-align:center; color:#8E2C2C; font-weight:700; font-size:.95rem; margin:0 0 24px;
}
.danger-grid{
  display:grid; gap:16px; grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
}
.danger-card{
  background:#fff; border-radius:20px; padding:16px 18px; border:3px solid var(--red);
  cursor:pointer; transition:.3s cubic-bezier(.34,1.56,.64,1); position:relative;
}
.danger-card:hover, .danger-card:focus-visible{
  transform: translateY(-6px) rotate(-1deg);
  box-shadow: 0 14px 28px rgba(201,46,46,0.28);
}
.danger-card-title{
  font-weight:800; color:var(--red-dark); font-size:1rem; display:flex; align-items:center; gap:8px; margin:0;
}
.danger-card-body{
  display:none; margin-top:10px; font-size:.88rem; color:#5B2222; font-weight:600; line-height:1.8;
}
.danger-card.open .danger-card-body{display:block;}
.danger-card.open{transform:none;}
.danger-card-body ul{margin:6px 0; padding-right:18px;}
.danger-card-body li{margin-bottom:5px;}

/* ===== Reward toast / modal ===== */
.reward-toast{
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(140%);
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  color:var(--ink); font-weight:800; font-size:1.05rem;
  padding:16px 26px; border-radius:var(--r-pill); box-shadow:var(--shadow-lg);
  border:4px solid #fff;
  display:flex; align-items:center; gap:10px;
  z-index:200; transition: transform .55s cubic-bezier(.34,1.56,.64,1);
  text-align:center; max-width:90vw;
}
.reward-toast.show{transform:translateX(-50%) translateY(0);}

.confetti-piece{
  position:fixed; top:-20px; z-index:300; pointer-events:none; border-radius:3px;
  animation: fall linear forwards;
}
@keyframes fall{
  to{ transform: translateY(110vh) rotate(540deg); opacity:.9; }
}

/* ===== Final celebration ===== */
.finale{
  position:relative; z-index:2; text-align:center; padding:50px 20px 100px;
  max-width:700px; margin:0 auto;
}
.finale-card{
  background:var(--white); border-radius:32px; padding:40px 26px; box-shadow:var(--shadow-lg);
  border:5px dashed var(--grass2);
}
.finale h2{font-size:1.8rem; color:var(--grass-dark); margin-top:0;}
.finale p{color:var(--ink-soft); font-weight:600; font-size:1rem;}
.trophy{font-size:3.4rem; display:block; margin-bottom:10px; animation:bob 2.4s ease-in-out infinite;}

/* footer note */
.note-foot{
  text-align:center; color:var(--ink-soft); font-weight:700; font-size:.85rem; padding-bottom:30px; position:relative; z-index:2;
}

/* Section nav dots (optional aid) */
.field-divider{
  display:flex; align-items:center; justify-content:center; gap:8px; margin: 10px 0 36px;
  color:var(--grass-dark); font-weight:700; font-size:.85rem;
}
.field-divider span{width:40px; height:3px; background:var(--grass2); border-radius:3px; display:inline-block;}

@media (max-width:560px){
  .topbar{padding:8px 12px;}
  .hero{padding:40px 14px 60px;}
  .field{padding:6px 14px 46px;}
}

[tabindex]:focus-visible, button:focus-visible{
  outline:3px solid var(--blue-dark);
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
}
</style>
</head>
<body>

<div class="scenery" id="scenery"></div>

<header class="topbar">
  <div class="logo">🌳 حديقة التربية الأسرية</div>
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>

<section class="hero">

  <div class="balloon-row">
    <div class="mini-balloon" style="background:var(--pink)">🧠</div>

</section>

<main id="mainContent"></main>

<div class="reward-toast" id="rewardToast">🎉 رائع! أنهيت قسماً كاملاً!</div>

<footer class="note-foot">صُممت بكل حب لتجعل المذاكرة نزهة في الحديقة 🌼</footer>

/* ============ RENDER ============ */
const mainEl = document.getElementById('mainContent');
let totalCards = 0;
let doneCards = new Set();

function cardHTML(card, idx, sIdx){
  const cid = `s${sIdx}-c${idx}`;
  return `
  <div class="card" tabindex="0" role="button" aria-expanded="false" data-cid="${cid}" onclick="toggleCard(this,'${cid}','${sIdx}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
    <div class="card-check">✓</div>
    <span class="card-emoji">${card.emoji}</span>
    <h4 class="card-title">${card.title}</h4>
    <p class="card-teaser">${card.teaser}</p>
    <div class="card-body">${card.body}</div>
  </div>`;
}

function fieldHTML(section, sIdx){
  totalCards += section.cards.length;
  const cardsHtml = section.cards.map((c,i)=>cardHTML(c,i,sIdx)).join('');
  return `
  <section class="field ${section.cls}" id="field-${section.id}">
    <div class="field-header">
      <div class="field-icon" style="background:${section.color}">${section.icon}</div>
      <div>
        <div class="field-title">${section.title}</div>
        <div class="field-sub">${section.sub}</div>
      </div>
    </div>
    ${section.noteBefore || ''}
    <div class="grid">${cardsHtml}</div>
    ${section.noteAfter || ''}
  </section>
  <div class="field-divider"><span></span> 🌼 <span></span></div>
  `;
}

mainEl.innerHTML = sections.map((s,i)=>fieldHTML(s,i)).join('') + dangerZoneHTML() + finaleHTML();
document.getElementById('starsTotal').textContent = totalCards;

function dangerZoneHTML(){
  const cards = dangerCards.map((d,i)=>`
    <div class="danger-card" tabindex="0" role="button" aria-expanded="false" onclick="toggleDanger(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <p class="danger-card-title">${d.emoji} ${d.title}</p>
      <div class="danger-card-body">${d.body}</div>
    </div>`).join('');
  return `
  <section class="danger-zone">
    <div class="danger-box">
      <div class="monster-head">
        <div class="horn l"></div><div class="horn r"></div>
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
      </div>
      <h2 class="danger-title">⚠️ منطقة الوحش اللطيف ⚠️</h2>
      <p class="danger-sub">هنا تختبئ "التريكات" والأخطاء الشائعة... افتحي كل صندوق بحذر وحفظيه جيداً!</p>
      <div class="danger-grid">${cards}</div>
    </div>
  </section>`;
}

function finaleHTML(){
  return `
  <section class="finale" id="finaleSection" style="display:none;">
    <div class="finale-card">
      <span class="trophy">🏆</span>
      <h2>أحسنتِ! أنهيتِ نزهة الحديقة بالكامل 🌳</h2>
      <p>جمعتِ كل النجوم وقرأتِ كل بطاقة. أنتِ جاهزة الآن لتذاكري بثقة! 💪✨</p>
    </div>
  </section>`;
}

/* ============ INTERACTIONS ============ */
function updateProgress(){
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const starsCount = document.getElementById('starsCount');
  const pct = totalCards ? Math.round((doneCards.size/totalCards)*100) : 0;
  fill.style.width = pct + '%';
  label.textContent = pct + '%';
  starsCount.textContent = doneCards.size;

  if(pct === 100){
    document.getElementById('finaleSection').style.display = 'block';
    burstConfetti();
  }
}

function toggleCard(el, cid, sIdx){
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  el.setAttribute('aria-expanded', String(!wasOpen));
  if(!wasOpen){
    if(!doneCards.has(cid)){
      doneCards.add(cid);
      el.classList.add('done');
      updateProgress();
      checkSectionComplete(sIdx);
    }
  }
}

function checkSectionComplete(sIdx){
  const section = sections[sIdx];
  const allDone = section.cards.every((c,i)=>doneCards.has(`s${sIdx}-c${i}`));
  if(allDone){
    const cleanTitle = section.title.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
    showReward(`🎉 رائع! أنهيتِ قسم "${cleanTitle}" بالكامل!`);
  }
}

function toggleDanger(el){
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  el.setAttribute('aria-expanded', String(!wasOpen));
}

let toastTimer;
function showReward(msg){
  const toast = document.getElementById('rewardToast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 3200);
  burstConfetti(18);
}

function burstConfetti(n=40){
  const colors = ['#FF6FA5','#FFCB3B','#5FC2F0','#A78BFA','#FF9A52','#4FAF52'];
  for(let i=0;i<n;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    piece.style.width = size+'px';
    piece.style.height = (size*1.4)+'px';
    piece.style.left = Math.random()*100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2 + Math.random()*1.6)+'s';
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(), 4000);
  }
}

/* ============ SCENERY: clouds ============ */
(function buildScenery(){
  const scenery = document.getElementById('scenery');
  scenery.innerHTML = '<div class="sun"></div>';
  const cloudSVG = (w,h,opacity)=>`
    <svg width="${w}" height="${h}" viewBox="0 0 200 100" style="opacity:${opacity}">
      <ellipse cx="60" cy="60" rx="50" ry="32" fill="#fff"/>
      <ellipse cx="110" cy="48" rx="42" ry="30" fill="#fff"/>
      <ellipse cx="150" cy="62" rx="38" ry="26" fill="#fff"/>
      <ellipse cx="90" cy="72" rx="60" ry="24" fill="#fff"/>
    </svg>`;
  const positions = [
    {top:'8%', dur:'55s', delay:'0s', w:160, h:80, op:0.95},
    {top:'18%', dur:'70s', delay:'-20s', w:120, h:60, op:0.85},
    {top:'4%', dur:'85s', delay:'-50s', w:200, h:100, op:0.8},
    {top:'26%', dur:'62s', delay:'-10s', w:100, h:50, op:0.9}
  ];
  positions.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'cloud';
    div.style.top = p.top;
    div.style.animationDuration = p.dur;
    div.style.animationDelay = p.delay;
    div.innerHTML = cloudSVG(p.w,p.h,p.op);
    scenery.appendChild(div);
  });
})();
</script>
